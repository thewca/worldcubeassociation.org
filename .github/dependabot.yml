version: 2
updates:
- package-ecosystem: bundler
  directory: "/"
  schedule:
    interval: weekly
    day: monday
    time: "06:00"
  ignore:
    # Ignore all dependencies that (currently) point to GitHub forks that we ourselves maintain
    #   (in order for updates to be available, we ourselves would need to trigger a fork sync.)
    - dependency-name: time_will_tell
    - dependency-name: iso
    - dependency-name: selectize-rails
    - dependency-name: i18n-country-translations
  open-pull-requests-limit: 10
- package-ecosystem: npm
  directory: "/"
  schedule:
    interval: weekly
    day: monday
    time: "06:00"
  ignore:
    # Version 7 automatically activates React Compiler strict rules that we won't implement in the old ecosystem
    - dependency-name: eslint-plugin-react-hooks
      versions:
        - ">= 7"
    # Fundamental compatibility issue with @pmmmwh/react-refresh-webpack-plugin,
    #   see https://github.com/pmmmwh/react-refresh-webpack-plugin/issues/1014
    - dependency-name: webpack-dev-server
      versions:
        - ">= 6"
    # Version 7 has some major migration requirements, which are too much for the legacy React.
    #   We will support the new releases in NextJS, so the migration will happen as part of porting pages
    - dependency-name: "@fullcalendar/*"
      versions:
        - ">= 7"
  open-pull-requests-limit: 10
- package-ecosystem: npm
  directory: "/next-frontend"
  schedule:
    interval: weekly
    day: monday
    time: "06:00"
  groups:
    react:
      patterns:
        - "react"
        - "react-dom"
    payload:
      patterns:
        - "payload"
        - "@payloadcms/*"
    chakra-ui:
      patterns:
        - "@chakra-ui/*"
    fullcalendar:
      patterns:
        - "@fullcalendar/*"
    nextjs:
      patterns:
        - "next"
        - "eslint-config-next"
    tanstack-query:
      patterns:
        - "@tanstack/react-query"
        - "@tanstack/eslint-plugin-query"
  open-pull-requests-limit: 10
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: weekly
  open-pull-requests-limit: 10
