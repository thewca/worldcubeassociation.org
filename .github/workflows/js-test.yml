name: Javascript tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    paths:
      - 'next-frontend/**/*'
      - '.env*'
      - 'docker-compose.yml'
      - 'Dockerfile*'
      - '.github/workflows/js-test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      NODE_MAJOR: 24
    defaults:
      run:
        working-directory: next-frontend
    steps:
      - uses: actions/checkout@v6
      - name: Set up Corepack/Yarn
        run: corepack enable # this allows NPM to use its own Yarn. It is crucial that this is run BEFORE the Node setup!
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_MAJOR }}
          cache: 'yarn'
      - name: Install fresh Yarn packages
        run: yarn install
      - name: Check types
        run: yarn run check:types
      - name: Run Lint
        run: yarn run lint
      - name: Run build
        run: yarn run build
      - name: Verify newrelic loads from standalone output
        # Simulates the production container startup: NODE_OPTIONS='-r newrelic'.
        # If any transitive dep is missing from the standalone node_modules
        # (e.g. meriyah via @apm-js-collab/code-transformer), this step fails
        # before the image is built or deployed.
        working-directory: next-frontend/.next/standalone
        env:
          NODE_ENV: production
          NEW_RELIC_LICENSE_KEY: ci-test-not-real
          NEW_RELIC_APP_NAME: ci-test
          NEW_RELIC_LOG_LEVEL: error
        run: node -e "require('./node_modules/newrelic')"
