  page:
    translators:
      #original_hash: 959d354
      title: Prevajalci
    officers_and_board:
      #original_hash: c9bae18
      title: Vodstvo WCA
      #original_hash: 312e799
      officers_description: >-
        Uradniki WCA skrbijo za naloge, povezane s statusom neprofitnosti
        organizacije WCA. Uradniki so izvoljeni s strani WCA upravnega odbora.
        Izvršni direktor je glavni izvršni uradnik WCA, predsednica predseduje
        vsem sestankom upravnega odbora, tajnik skrbi za dokumente organizacije,
        blagajnik pa za vse finančne zadeve.
      #original_hash: 19d4bbb
      board_description: >-
        Upravni odbor WCA je zadolžen za vodenje organizacije kot celote in
        izpolnjujejo vse naloge, ki jih ne izpolnjujejo druge ekipe ali odbori.
    teams_committees_councils:
      #original_hash: 1d14e2f
      title: WCA ekipe in odbori
      #original_hash: 9fdee8f
      description: >-
        WCA ekipe in odbori so ključen del organizacije in izpolnjujejo
        vsakdanje naloge, ki so potrebne za delovanje organizcije. Odbore
        sestavljajo člani WCA skupnosti, vključno z WCA delegati in tekmovalci.
        Vsaka ekipa ima vodjo, ki skrbi za ustrezno delovanje ekipe in vodi
        druge člane ekipe. Ko so v ekipah ali odborih na voljo prosta mesta, so
        informacije o načinu prijave objavljene na prvi strani.
      #original_hash: b37456c
      contact_button: Kontakt
      #original_hash: ae7928f
      no_contact_description: Kontaktne informacije te ekipe/odbora niso javno dostopni.
      groups_name:
        #original_hash: 90a1280
        wat: WCA ekipa za arhiviranje
        #original_hash: 63a2388
        wct: WCA ekipa za komunikacijo
        #original_hash: 2b81984
        wcat: WCA ekipa za najavo tekmovanj
        #original_hash: 94c2e42
        wic: WCA odbor za integriteto
        #original_hash: d1dbb86
        weat: WCA ekipa izvršnih asistentov
        #original_hash: 9cb13de
        wfc: WCA finančni odbor
        #original_hash: 2035811
        wmt: WCA ekipa za trženje
        #original_hash: 2517097
        wmct: WCA ekipa za velika prvenstva
        #original_hash: 8f32116
        wqac: WCA odbor za zagotavljanje kakovosti
        #original_hash: 3da1e85
        wrc: WCA odbor za pravilnik
        #original_hash: 67be768
        wrt: WCA ekipa za rezultate
        #original_hash: a14bc62
        wst: WCA ekipa za programsko opremo
        #original_hash: 58765c7
        wsot: WCA ekipa za športno prepoznavo
        #original_hash: 78949a7
        wapc: WCA odbor za pritožbe
      groups_description:
        #original_hash: d62001b
        wat: >-
          WCA ekipa za arhiviranje (WAT) skrbi za zgodovinske arhive WCA.
          Njihova naloga je dokumentiranje ključnih dogodkov v hitrostnem
          kockanju in opaznih dosežkov WCA, ki bod umeščeni v širšo časovnico
          delovanja organizacije z namenom ohranjanja zapuščine WCA na podoročju
          hitrostnega kockanja.
        #original_hash: 7803faf
        wct: >-
          WCA ekipa za komunikacijo (WCT) ponuja podporo pri komunikaciji WCA s
          skupnostjo in splošno javnostjo. Pričakuje se, da komunikacija s
          strani WCA prispeva k izpolnjevanju ciljev WCA in da podpira pozitivno
          vzdušje prijaznosti, transparentnosti, vključevanja, odprtosti in
          odzivnosti.
        #original_hash: bd69012
        wcat: >-
          WCA ekipa za najavo tekmovanj (WCAT) potrjuje in najavlja WCA
          tekmovanja, ki jih predlagajo WCA delegati, in skrbi, da se te najave
          držijo standardov kvalitete WCA. Ta ekipa je zadolžena tudi za
          ohranjanje pravilnosti pri predlaganju tekmovanj, kot zahtevajo
          dokumenti, kot je Politika zahtev za tekmovanja WCA.
        #original_hash: 5007698
        wic: >-
          WCA odbor za integriteto (WIC) izvaja nedovisne preiskave v povezavi s
          člani WCA skupnosti in incidenti, ki so se zgodili med WCA tekmovanju,
          ali na uradnih spletnih WCA platformah. Pri incidentih, ki jih
          preiskujejo, gre za domnevne kršitve duha organizacije, Kodeksa
          ravnanja, Kodeksa etike in/ali WCA pravilnika.
        #original_hash: be491ec
        weat: >-
          WCA ekipa izvršnih asistentov (WEAT) izvaja administrativne naloge
          upravnega odbora WCA.
        #original_hash: fc67562
        wfc: >-
          WCA finančni odbor (WFC) skrbi za celotne finance WCA, vključno s
          proračunom, poročanjem, analizami, knjigovodstvom in davčnimi
          napovedmi. Upravljajo tudi z največjim virom prihodka organizacije,
          WCA dajatvami, skupaj z različnimi programi financiranj, ki podpirajo
          lokalne skupnosti na različnih stopnjah razvoja, vključno s
          financiranjem potovanj in opreme ter podporo regionalnim
          organizacijam.
        #original_hash: 88a00fa
        wmt: >-
          WCA ekipa za trženje (WMT) upravlja z blagovno znamko WCA, išče
          sponzorstva in trži izdelke WCA.
        #original_hash: fcaa701
        wmct: >-
          WCA ekipa za velika prvenstva (WMCT) nadzira koordinacijo in
          napredovanje celincskih in svetovnih prvenstev WCA z razvojem smernic
          in strateških načrtov, upravljanjem izbora mest gostiteljev, podporo
          organizacijskim ekipam in zagotavljanjem doslednih izkušenj na
          prvenstvih.
        #original_hash: 010e628
        wqac: >-
          WCA odbor za zagotavljanje kakovosti (WQAC) spodbuja nenehno
          zviševanje standardov WCA in njihovo udejstvovanje po vsem svetu z
          namenom zagotavljanja visoke kakovosti procesov, WCA prostovoljcev,
          regionalnih organizacij, organizatorjev tekmovanj in prostovoljcev na
          tekmovanjih.
        #original_hash: 355babe
        wrc: >-
          WCA odbor za pravilnik (WRC) skrbi za vse izzive, ki so povezani z
          uporabo, izboljšavami in razvojem WCA pravilnika. Delegatom nudijo
          podporo pri vseh postopkovnih zadevah na tekmovanjih in podajajo
          odločitve glede nerešenih incidentov.
        #original_hash: 7ca3e6f
        wrt: >-
          WCA ekipa za rezultate (WRT) upravlja z vsemi podatki v podatkovnih
          bazah WCA, vključno s podatki o rezultatih tekmovanj in podatkih o
          osebah.
        #original_hash: f905744
        wst: >-
          WCA ekipa za programsko opremo (WST) upravlja s programsko opremo WCA
          (spletna stran, mešalni programi, zvezki, skrbniška orodja).
        #original_hash: 638652c
        wsot: >-
          WCA ekipa za športno prepoznavo (WSOT) nadzoruje in podpira
          preoznavanje WCA kot mednarodno športno organizacijo.
        #original_hash: 30d6048
        wapc: >-
          WCA odbor za pritožbe (WAC) preglejuje in rešuje pritožbe na
          odločitve, ki so bile sprejete s strani drugih prostovoljcev WCA. WAC
          zagotavlja neodvisno in nepristransko obravnavo, da zagotovi
          pravičnost, razumnost in skladnost odločitev z WCA pravili in
          pravilniki.
