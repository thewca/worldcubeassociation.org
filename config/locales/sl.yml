        #original_hash: 74affff
        incidents: >-
          Prosimo, poročajte o vseh nestandardnih incidentih. Oštevilčite jih
          začenši z 1., tako da se ostali delegati ob komentiranju lahko
          sklicujejo na njihove številke. Tudi, če se vse zdi generično, vseeno
          nanizajte vsaj najvidnejše primere. Prosimo, obkljukajte ustrezna
          polja spodaj, če želite povratno informacijo.
        #original_hash: 7577db4
        setup_images: >-
          Naložiti MORATE vsaj %{image_count} slik, ki prikazujejo območja, kjer
          se izvaja mešanje in tekmovanje na tem tekmovanju, najbolje tiste,
          posnete med tekmovanjem (tudi ostale slike so dobrodošle). Izbere
          lahko več datotek hkrati. Slike lahko izbrišete šele, ko je bilo
          naloženih dovolj drugih slik (če želite sliko zamenjati, morate
          najprej naložiti novo, šele potem izbrisati staro). Če slik z območij
          mešanja in tekmovanja, medtem ko sta ti v uporabi, nimate, prosimo,
          razložite zakaj.
