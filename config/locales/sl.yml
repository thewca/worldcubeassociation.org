  regional_organizations:
    #original_hash: 37b8fdc
    title: Regionalne organizacije
    #original_hash: 15a06d6
    content: 'WCA priznava sledeče regionalne organizacije:'
    #original_hash: e5b77eb
    empty: WCA trenutno ne priznava nobene regionalne organizacije.
    how_to:
      #original_hash: b243b1f
      title: Kako postati priznana WCA regionalna organizacija
      #original_hash: 9f31403
      description: >-
        WCA priznava različne regionalne organizacije po vsem svetu. Namen
        regionalnih organizacij WCA je organiziranje WCA tekmovanj in podpiranje
        dejavnosti WCA v regiji. Regije, ki želijo ustanoviti regionalno
        organizacijo, so vabljene, da prispevajo k WCA na svojem območju, preden
        oddajo prijavo. Za pomoč pri organizaciji tekmovanja WCA na vašem
        območju se obrnite na najbližjega delegata WCA.
    requirements:
      #original_hash: 1e04fd7
      title: Zahteve za WCA regionalne organizacije
      list:
        #original_hash: 22a9f26
        '1': Aktivno organiziranje in podpiranje WCA tekmovanj v regiji
        #original_hash: 63714d1
        '2': >-
          Prispevanje pomoči pri organizaciji celinskih WCA tekmovanj, ki
          potekajo na celini regionalne organizacije, če za to zaprosi
          organizacijska ekipa tekmovanja
        #original_hash: 3c07dd6
        '3': >-
          Spoštovanje in udejstvovanje ciljev, ki jih določata statut in sklepi
          WCA
        #original_hash: 0c3576b
        '4': Skladnost z vsemi veljavnimi pravili WCA
        #original_hash: 88cf548
        '5': 'Sprejemanje in upoštevanje odločitev, ki jih podajo prostovoljci WCA'
        #original_hash: d4ae7c1
        '6': >-
          Hranjenje kopije veljavnega statuta in predpisov v evidenci WCA v
          elektronski obliki
