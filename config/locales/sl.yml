  faq:
    #original_hash: d790b40
    title: Pogosto zastavljena vprašanja
    #original_hash: 3451241
    contact_html: 'Če ti odgovori niso pomagali, nas %{contact_us}!'
    #original_hash: 6cf2723
    contact_us: kontaktirajte
    #original_hash: 9100be3
    search_for_competition: 'Tekmovanja lahko iščete tukaj:'
    #original_hash: cba12bc
    already_logged_in: Z računom WCA ste že prijavljeni.
    #original_hash: 5b7fa52
    create_an_account: 'Uporabniški račun lahko ustvarite %{here}.'
    #original_hash: f8c910c
    claim_your_wca_id: 'WCA ID lahko zahtevate %{here}.'
    #original_hash: 4dfb4c7
    create_an_account_and_claim: >-
      Račun ustvarite %{here}. Po vpisu z novim računom vas bomo prosili, da
      zahtevate vaš WCA ID.
    answers:
      '1':
        #original_hash: f79b522
        title: Kako pridobim WCA ID in WCA profil?
        content:
          #original_hash: b645fe1
          '1': >-
            Če niste še nikoli tekmovali, pojdite na <a
            href='/competitions'>tekmovanje</a>! Vaš WCA ID in WCA profil bo
            ustvarjen po objavi rezultatov z vašega prvega tekmovanja.
      '2':
        #original_hash: eb948e7
        title: Kako lahko najdem WCA tekmovanje?
        content:
          #original_hash: d195cec
          '1': Preverite naš seznam <a href='/competitions'>tekmovanj</a>.
      '3':
        #original_hash: af6ad12
        title: >-
          Kako se lahko prijavim na tekmovanje? Na koga se lahko obrnem, če pri
          prijavi naletim na težave?
        content:
          #original_hash: 7b91db1
          '1': >-
            Mnogo tekmovanj za prijave uporablja WCA spletno stran, nekatera pa
            uporabljajo svoje sisteme za prijavo. Za več informacij se obrnite
            na organizatorje posameznega tekmovanja. %{comp_search_form}
      '4':
        #original_hash: 9a5ae28
        title: >-
          Kakšni so pogoji za sodelovanje na WCA tekmovanju? Kaj moram vedeti
          preden se udeležim WCA tekmovanja?
        content:
          #original_hash: 3bb4e11
          '1': >-
            Za udeležbo na WCA tekmovanjih v splošnem ni veliko pogojev. Kljub
            temu se pričakuje, da so vsi tekmovalci seznanjeni z <a
            href='https://www.worldcubeassociation.org/regulations/'>WCA
            pravili</a> in jih razumejo. Če angleščina ni vaš materni jezik in
            imate težave z razumevanjem dokumenta, potem preberite <a
            href='https://www.worldcubeassociation.org/regulations/translations/'>prevedeno
            različico</a>.
      '5':
        #original_hash: 3b657aa
        title: Kako lahko v svojem kraju organiziram tekmovanje WCA?
        content:
          #original_hash: 3d4eb1c
          '1': >-
            Če želite organizirati tekmovanje, je priporočljivo, da se najprej
            udeležite vsaj nekaj drugih tekmovanj. Tako pridobite nekaj
            izkušenj, ki so potrebne za organizacijo.
          #original_hash: be305b8
          '2': >-
            WCA tekmovanja morajo upoštevati <a target='_blank'
            href='https://www.worldcubeassociation.org/regulations/'>WCA
            pravilnik</a>. Organizacijski ekipi se pravil ni potrebno naučiti na
            pamet, vendar njihovo poznavanje drastično pripomore k pravilni
            organizaciji tekmovanja.
          #original_hash: dbd72c2
          '3': >-
            Organizacijska ekipa mora kontaktirati bližnjega <a target='_blank'
            href='https://www.worldcubeassociation.org/delegates'>WCA
            delegata</a>. Nadzor s strani WCA delegata je pogoj, da je
            tekmovanje uradno priznano s strani WCA. Delegat bo pomagal tudi pri
            vodenju organizacije za uspešno izvedbo tekmovanja.
          #original_hash: 576c3b8
          '4': >-
            Obiščite <a target='_blank'
            href='https://www.worldcubeassociation.org/organizer-guidelines'>Smernice
            za organizatorje WCA tekmovanj</a> za več informacij.
      '6':
        #original_hash: 8005a61
        title: >-
          Čemu služijo WCA uporabniški računi? Kakšna je razlika med WCA
          uporabniškim računom in WCA profilom?
        content:
          #original_hash: 57a3767
          '1': >-
            WCA ID vam bo dodeljen, ko bodo objavljeni rezultati z vašega prvega
            tekmovanja, ki je priznano s strani WCA.
          #original_hash: c5ad7a3
          '2': >-
            WCA račun vam omogoča, da nam dokažete, kdo ste. Preko uporabniškega
            računa lahko svojemu profilu WCA dodate sliko in se prijavite na
            tekmovanja. To vas zavaruje pred drugimi osebami, ki bi se lahko
            izdajale za vas.
          #original_hash: 9ff083a
          '3': '%{current_user_status}'
      '7':
        #original_hash: d7ee9bd
        title: Kako spremenim profilno sliko?
        content:
          #original_hash: e619524
          '1': >-
            Najprej morate <a
            href='#how-do-i-connect-my-wca-account-with-my-wca-id'>ustvariti WCA
            uporabniški račun in ga povezati z vašim WCA ID.</a>
          #original_hash: 56a8f26
          '2': >-
            Ko ste račun povezali s svojim WCA ID, pojdite na <a
            href='%{profile_edit_path}'>stran za urejanje profila</a> in
            spremenite svojo profilno sliko.
      '8':
        #original_hash: 1d61217
        title: Kako povežem svoj WCA uporabniški račun s svojim WCA ID?
        content:
          #original_hash: 07bb6ec
          '1': '%{current_user_claim}'
      '9':
        #original_hash: 7a4a71d
        title: >-
          Prijavljen sem na tekmovanje in se želim prijaviti na dodatne
          discipline. Kako lahko to storim? Lahko pripeljem goste?
        content:
          #original_hash: 957487d
          '1': >-
            Prosimo, obrnite se na organizatorja. Kontaktne informacije lahko
            najdete na spletni strani tekmovanja. Če niste prepričani, kje se ta
            nahaja, preverite <a href='/competitions'>seznam tekmovanj</a>.
      results:
        #original_hash: 9aae576
        title: Kdaj so rezultati z WCA tekmovanja objavljeni na WCA spletno stran?
        content:
          #original_hash: 890d879
          '1': >-
            Ko se tekmovanje konča, mora WCA delegat ponovno preveriti vse
            tekmovalne listke in podatke o tekmovalcih, da se odkrijejo
            morebitne napake. Rezultati so nato posredovani WCA ekipi za
            rezultate (WCA Results Team - WRT), ki je odgovorna za nalaganje
            rezultatov tekmovanj in vzdrževanje podatkovne baze WCA. WRT naloži
            rezultate v podatkovno bazo WCA kakor hitro je mogoče.
          #original_hash: daf1cb1
          '2': >-
            To lahko traja od enega dneva pa vse do enega tedna - odvisno od
            velikosti tekmovanja in delegatove zasedenosti. Prosimo, bodite
            potrpežljivi.
          #original_hash: bf8adbe
          '3': >-
            Če ste že povezali WCA uporabniški račun z vašim WCA ID (glej
            spodaj), lahko <a href='%{preferences_edit_path}'>tukaj</a>
            omogočite prejemanje obvestil preko e-pošte, ko so vaši rezultati
            objavljeni.
      regulations1:
        #original_hash: 2951eb6
        title: Ali je moja uganka legalna za tekmovanje?
        content:
          #original_hash: 5ac78e4
          '1': >-
            Pravila glede ustreznih ugank lahko najdete v pravilniku v <a
            href='https://www.worldcubeassociation.org/regulations/#3'>členu
            3</a>. Vse uganke morajo biti odobrene s strani WCA delegata. Če
            niste prepričani, vprašajte delegata tekmovanja. Za vsak slučaj
            priporočamo, da prinesete tudi rezervno uganko.
      regulations2:
        #original_hash: 48f1234
        title: Ali na uradnem WCA tekmovanju lahko uporabim uganke z magneti?
        content:
          #original_hash: 024ce81
          '1': >-
            Uganke z magneti so dovoljene, dokler so skladne z <a
            target='_blank'
            href='https://www.worldcubeassociation.org/regulations/'>WCA
            pravilnikom</a>. Posebno pozorni bodite na <a
            href='https://www.worldcubeassociation.org/regulations/#3h'>pravilo
            3h</a>.
      regulations3:
        #original_hash: c7460a5
        title: >-
          Izgubil sem pokrovček ali del uganke. Ali jo lahko kljub temu
          uporabljam?
        content:
          #original_hash: 0d76323
          '1': >-
            Takšne uganke ni dovoljeno uporabljati. Uganke ne smejo biti
            poškodovane ali imeti kakršnih koli lastnosti, ki bi pomagale
            razlikovati podobne delčke med seboj (glej <a
            href='https://www.worldcubeassociation.org/regulations/#3j'>pravilo
            3j</a>).
      regulations4:
        #original_hash: 43f9da8
        title: 'Koliko moram biti star, da se prijavim na WCA tekmovanje?'
        content:
          #original_hash: 984704a
          '1': >-
            Starostne omejitve ni. Vseeno pa je pred prijavo potrebno pridobiti
            dovoljenje staršev (glej <a
            href='https://www.worldcubeassociation.org/regulations/#2b'>pravilo
            2b</a>).
  about:
    #original_hash: 9ac918a
    title: O nas
    #original_hash: ee35764
    mission_statement: >-
      Naš namen je krepiti globalno kockarsko skupnost in spodbujati zabavno in
      pošteno tekmovalno okolje za vse.
    #original_hash: 5bed828
    mission_footer: Namen zveze
    #original_hash: cdab446
    who_we_are_title: Kdo smo
    #original_hash: 303f17a
    who_we_are_content_html: >-
      <p>Svetovna kockarska zveza (World Cube Association) upravlja tekmovanja v
      reševanju mehanskih ugank, ki se jih rešuje z obračanjem skupin delčkov.
      Najbolj znana izmed njih je Rubikova kocka, ki jo je izumil madžarski
      profesor Ernő Rubik. Nekatere izmed teh ugank so izbrane kot uradne WCA
      discipline.</p> <p>WCA se v zadnjem desetletju hitro razvija, na naših
      tekmovanjih je tekmovalo že več kot 245.000 ljudi. Kljub veliki rasti
      ostajamo zveza, ki jo skoraj v celoti vodijo prostovoljci, od lokalnih
      organizatorjev do WCA delegatov in upravnega odbora. Izjemno hvaležni smo
      vsem, ki za delovanje WCA namenijo (velik) del svojega prostega časa.
      Upamo, da bomo z večjo finančno podporo našim tekmovanjem prinesli še
      večjo raven profesionalnosti in še naprej odobravali mnogo dogodkov po
      vsem svetu.</p>
    #original_hash: bccd8c5
    spirit: >-
      Naše poslanstvo je ljudem z vsega sveta omogočati, da se v prijateljskem
      okolju lahko zabavajo, si med seboj pomagajo in tekmujejo v športnem duhu.
    #original_hash: 69131cc
    spirit_footer: Poslanstvo WCA
    #original_hash: c1781ee
    our_goals_title: Naši cilji
    #original_hash: c1144d4
    our_goals_content_html: >-
      <p>Svetovna kockarska zveza želi mladim po vsem svetu ponuditi priložnost
      za vodenje in sodelovanje v skupnosti s povečanjem dostopnosti tekmovanj v
      reševanju mehanskih ugank. Verjamemo, da izkušnje na tekmovanjih in
      znotraj naše skupnosti mladim, ki v njej sodelujejo, ustvarjajo
      priložnosti za rast in da predstavljanje kockarskih dogodkov novim
      skupinam ljudi omogoča rast celotni skupnosti. Dokument, ki vsebuje
      strateški načrt WCA lahko najdete <a
      href="https://documents.worldcubeassociation.org/documents/WCA_Strategic_Plan.pdf">tukaj</a>.</p>
    #original_hash: f64ccc7
    whats_next_title: Kaj sledi?
    #original_hash: 3312277
    whats_next_content_html: >-
      <p>Svetovna kockarska zveza je v svoji zgodovini gostila več kot 245.000
      tekmovalcev v 158 različnih državah, razvijati pa se želimo še naprej!
      Kockarska skupnost vztrajno raste od ustanovitve WCA leta 2004, kar želimo
      nadaljevati tudi v prihodnosti s povečanjem dostopnosti tekmovanj v novih
      krajih. V prihodnosti želimo našo skupnost še bolj podpirati prek
      sodelovanja in približevanja tistim, ki jih zanimajo mehanske uganke.</p>
    #original_hash: dc71704
    world_championship_title: Svetovno prvenstvo
    #original_hash: 57cf7f7
    world_championship_content_html: >-
      <p>Vsaki dve leti odobrimo tekmovanje, ki na katerem določimo svetovnega
      prvaka. Ti dogodki zahtevajo izjemno skrbno načrtovanje številnih
      prostovoljcev, pa tudi veliko finančno vlaganje v rezervacijo prizorišča
      in potrebne priprave.</p>
    #original_hash: 1aa5344
    contributing_title: Prispevki
    #original_hash: 538a82f
    contributing_content_html: >-
      Donirate lahko s plačilno kartico preko Guidestar %{here_credit} ali prek
      Paypal-a %{here_paypal}. Če želite napisati ček, ga lahko napišete na:
    #original_hash: 2af9b71
    tax_deductible_note: V Združenih državah Amerike so donacije davčno olajšljive.
    #original_hash: 6026d35
    other_help_title: Drugi načini za podporo
    #original_hash: cb228f6
    other_help_content_html: >-
      <p>Če menite, da bi Svetovni kockarski zvezi lahko pomagali na kakršen
      koli način, nas kontaktirajte na <a
      href="mailto:communication@worldcubeassociation.org">communication@worldcubeassociation.org</a>!</p>
    donation_banner:
      #original_hash: 1aaf818
      content: >-
        Svetovna kockarska zveza je po členu 501(c)(3) davkov oproščena
        organizacija. Kot neprofitna organizacija, ki jo vodijo izključno
        prostovoljci, z veseljem sprejemamo vaše donacije, ki nam pomagajo
        uresničevati našo vizijo - več tekmovanj po vsem svetu.
      #original_hash: 24c87db
      donate_credit: Doniraj s plačilno kartico
      #original_hash: 0e5a9c3
      donate_paypal: Doniraj prek Paypal-a
      #original_hash: 96d77f3
      donate_other: Drugi načini za doniranje
    structure:
      #original_hash: 9482c5d
      title: Struktura
      board:
        #original_hash: 19d4bbb
        description: >-
          Upravni odbor WCA je odgovoren za vodenje organizacije kot celote in
          izpolnjevanje vseh dolžnosti, ki jih ne izpolnjujejo druge ekipe in
          odbori
      users:
        #original_hash: 57bbaad
        profile: 'profil %{user_name}'
      #original_hash: f8c3f3c
      operations_html: 'Vsakodnevne naloge opravljajo WCA %{committees_and_teams}.'
      #original_hash: 0e7a036
      teams_committees: ekipe in odbori
      #original_hash: 7e849d2
      delegates_html: >-
        <p><strong>WCA delegat</strong> je vloga, definirana v WCA sklepih in
        prikazana v WCA pravilniku. Glavna naloga delegata je nadzor tekmovanj v
        imenu WCA. Delegati so odgovorni, da vsa WCA tekmovanja potekajo v
        skladu z namenom, pravili in poslanstvom WCA. WCA razlikuje med
        <strong>višjimi delegati (senior delegati)</strong>,
        <strong>regionalnimi delegati</strong>, <strong>polnopravnimi
        delegati</strong>, <strong>delegati začetniki (junior delegati)</strong>
        in <strong>delegati pripravniki</strong>%{see_link}.</p> <p>Poleg
        običajnih obveznosti WCA delegata je višji delegat ali regionalni
        delegat zadolžen za vodenje delegatov s svojega področja, nanj pa se
        lahko obrne tudi skupnost glede regionalnih zadev.</p> <p>Novi delegati
        najprej postanejo delegati začetniki. Ko dokažejo sposobnost
        samostojnega vodenja tekmovanja, napredujejo v delegata.</p> <p>Delegati
        pripravniki se učijo delegiranja, tekmovanja pa lahko nadzirajo le pod
        mentorstvom drugega WCA delegata.</p>
      #original_hash: 27d18ac
      see_link_html: '(glej %{link})'
      #original_hash: 5b01fcc
      members_html: >-
        Vsi tekmovalci samodejno postanejo WCA <strong>člani</strong> na
        njihovem prvem WCA tekmovanju.
