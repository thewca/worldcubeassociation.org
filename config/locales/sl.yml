  homepage:
    #original_hash: 824d76b
    learn_more: Več o tem
    #original_hash: d8f3ae6
    title: Dobrodošli pri Svetovni kockarski zvezi
    #original_hash: d133986
    latest_news: Zadnje novice
    #original_hash: 06b01c4
    announcements: Obvestila
    #original_hash: f0cbb3e
