  about_regulations:
    #original_hash: 6bce1b5
    title: O pravilniku
    panel1:
      #original_hash: 1fa73f3
      title: Pravilnik
      #original_hash: 557095b
      content1_html: >-
        Vsa tekmovanja morajo slediti <a href="/regulations/">WCA
        pravilniku</a>. Pombembno je, da si vsak tekmovalec pred udeležbo na
        prvem tekmovanju pravilnik prebere vsaj enkrat.
      #original_hash: c8e1783
      content2_html: >-
        Pomembne odločitve o incidentih, ki so se zgodili na tekmovanjih in jih
        je obravnaval WCA odbor za pravilnik, najdete v <a
        href="/incidents">Evidenci incidentov</a>.
    panel2:
      #original_hash: 8ad8302
      title: Prevodi
      #original_hash: 7477d9b
      content1_html: >-
        WCA pravilnik je na voljo tudi v drugih jezikih: <a
        href="/regulations/translations/">prevodi</a>.
      #original_hash: 6add7a3
      content2_html: >-
        <strong>Pomembno</strong>: Čeprav so prevodi zelo koristni, ne gre za
        uradne različice pravilnika. Na tekmovanjih velja angleška verzija WCA
        pravilnika.
    panel3:
      #original_hash: 234fd4d
      title: Pogosta vprašanja o pravilniku
      #original_hash: 8afba93
      content1_html: >-
        Na strani <a href="/faq">pogosto zastavljenih vprašanj</a> najdete
        odgovore na nekatera vprašanja o WCA pravilih.
    panel4:
      #original_hash: ad5f6e7
      title: Smernice za organizatorje
      #original_hash: 9bbdf16
      content1_html: >-
        Če ste zainteresirani za organiziranje tekmovanja ali ga že načrtujete,
        preberite <a href="/organizer-guidelines">smernice za organizatorje</a>.
      #original_hash: 5016669
      content2_html: >-
        Ta dokument vsebuje pomembne informacije, prebrati ga mora vsak
        organizator tekmovanj.
  regulations_translations:
    #original_hash: a19a3f5
    title: 'WCA pravilnik: prevodi'
    #original_hash: 386ecc1
    paragraph1: >-
      Če govorite kateri koli jezik, razen angleščine, vam bodo ti prevodi morda
      v pomoč.
    #original_hash: 32b1132
    paragraph2: >-
      Upoštevajte, da prevodi nimajo uradnega statusa, čeprav so na voljo na
      spletni strani WCA: ne zagotavljajo nobenih jamstev. Če obstaja razlika
      med prevodom in (trenutno uradno) angleško različico, je treba uporabiti
      angleško različico.
