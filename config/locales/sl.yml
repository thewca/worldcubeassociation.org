        wic_incident_alert: >-
          Če je WIC incident občutljiv (vključno z, vendar ne omejeno na:
          kazniva dejanja, nadlegovanje, nasilje, itd.), prosimo, da ga
          izpustite iz poročila in kontaktirate WIC preko e-pošte. Za ostale WIC
          incidente napišite strnjeno, anonimizirano različico incidenta in
          pošljite WIC ostale podrobnosti preko zasebnega kanala. WIC bo vseeno
          podal povratno informacijo na anonimizirano različico z namenom
          splošnega ozaveščanja. Za vse incidente, v katere je bil vključen WCA
          prostovoljec, prosimo, izpustite vse podrobnosti iz poročila in
          kontakirajte WIC preko zasebnega kanala.
        #original_hash: f30abdc
        remarks: >-
          Pišite o kakršnih koli drugih podrobnostih, ki bi jih radi delili
          (npr. izboljšanje/upadanje znotraj skupnosti, prihodnji načrti za to
          regijo). Če ste z namenom jedrnatosti v prejšnjih predelih kaj
          izpustili, lahko pišete o tem tu.
