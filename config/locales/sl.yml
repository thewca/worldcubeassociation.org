  media_and_instagram:
    #original_hash: 1e9793e
    page_title: Mediji in Instagram
    general_media_submission:
      #original_hash: 2b4c8c8
      title: Oddaja splošnih medijev
      #original_hash: 670a1a8
      body_html: >-
        WCA deli članke in slike s tekmovanj, ki jih je zagotovila skupnost, na
        naši <a href="/media">strani za medije</a>. Če imate kaj, kar bi radi
        delili, izpolnite naš <a href="/media/new">splošni obrazec za oddajo
        medijskih prispevkov</a>!
    instagram_submission:
      #original_hash: e01c612
      title: Oddaja Instagrama
      #original_hash: 1acd0d2
      paragraph1_html: >-
        Kot ste morda videli, ima WCA <a
        href="https://www.instagram.com/thewcaofficial/">aktiven Instagram</a>!
        Da bi kar najbolje odražali globalno skupnost kockarjev, objavljamo
        vsebine, ki nam jih pošljejo kockarji z vsega sveta.
      #original_hash: 9b6abcd
      paragraph2: >-
        Če imate visokokakovostne fotografije ali videoposnetke, ki bi jih
        želeli objaviti, kliknite spodnji gumb in izpolnite obrazec! Da lahko
        objavimo vašo vsebino, morate biti njen lastnik in morate dati
        dovoljenje WCA za njeno objavo. Zaradi velikega števila prispevkov, ki
        jih prejmemo, ne moremo objaviti vseh, vendar je tukaj nekaj nasvetov za
        objavo vaše vsebine:
      #original_hash: cf5c955
      photo_quality: >-
        Poskrbite, da je kakovost fotografije/videoposnetka dobra. Ni nujno, da
        je posneto profesionalno, vendar kakovost ne sme negativno vplivati ​​na
        fotografijo ali videoposnetek.
      #original_hash: 0742378
      photo_interest: >-
        Poskusite narediti svojo vsebino zanimivo za širše občinstvo. Vsebina,
        ki je zanimiva le za peščico ljudi, ne sodi sem.
      #original_hash: 497bc27
      wca_related: >-
        Objavljajte fotografije in videoposnetke, ki so povezani z WCA, saj je
        to bistvo našega računa! Radi vidimo, kako se kockarji zabavajo!
      #original_hash: af882f2
      submit_instagram_content: Oddaj Instagram vsebino
    instagram_hosting:
      #original_hash: 5156783
      title: Gostovanje na Instagramu
      #original_hash: 541106b
      paragraph1_html: >-
        Včasih bomo članom skupnosti omogočili, da gostujejo na WCA Instagramu z
        objavljanjem zgodb (angl. Instagram stories) s tekmovanja, ki se ga
        udeležujejo! Če ste zainteresirani, kliknite gumb in izpolnite spodnji
        obrazec. WCA ekipa za komunikacijo vas bo kontaktirala, ko bodo
        posredovane vse informacije, če boste odobreni za gostovanje. Če imate
        kakršna koli vprašanja, <a
        href="https://www.worldcubeassociation.org/contact/website">nas
        kontaktirajte</a>.
      #original_hash: aca6c32
      paragraph2: >-
        Naš cilj je deliti malo osebne plati vsakega kockarja in vsakega
        tekmovanja. Ne žeimo, da je to veliko breme in seveda želimo, da najprej
        uživate v tekmovanju in ga nato delite z drugimi.
      #original_hash: af023ed
      paragraph3: 'Vlogo gostitelja lahko povzamemo takole:'
      #original_hash: 21efafe
      short_intro: 'Na kratko se predstavite, povejte nekaj o sebi in o tekmovanju'
      #original_hash: a053b5a
      venue_feel: >-
        Posnemite nekaj posnetkov, da gledalci dobijo občutek za prizorišče in
        ljudi. To je lahko le posnetek s tekmovalnega območja.
      #original_hash: d17fb2f
      people_solving: >-
        Poskusite posneti nekaj posnetkov ljudi, ki rešujejo (po možnosti hitrih
        ljudi na njihovih glavnih disciplinah)
      #original_hash: 76d2358
      mini_interviews: >-
        Lahko poskusite opraviti kratke intervjuje z ljudmi (organizatorji,
        delegati itd.), ki želijo povedati, kaj si mislijo o tekmovanju.
      #original_hash: 6003b20
      pictures_too: 'Lahko pošljete tudi slike, ni nujno, da so samo videoposnetki'
      #original_hash: 8813619
      paragraph4: >-
        Naša komunikacija čez vikend običajno poteka prek WhatsApp skupine.
        Prosimo, poskrbite, da poznate to platformo za sporočanje, ali pa nam
        sporočite, če je ne morete uporabljati, da se lahko dogovorimo za druge
        načrte.
      #original_hash: 38191c1
      apply_to_host: Prijavi se za gostovanje
    other_suggestions:
      #original_hash: 730873b
      title: Drugi predlogi?
      #original_hash: aa7ab5c
