  full_organizer_guidelines:
    #original_hash: 5d602df
    description: >-
      Dobrodošli v zbirki smernic za organizatorje tekmovanj, ki jih je zbral
      WQAC. Če razmišljate o tem, da bi postali organizator, vam toplo
      priporočamo, da preberete te dokumente. Razdeljeni so na ključne in zelo
      priporočene dokumente. Poskrbite, da boste z navedenimi informacijami
      seznanjeni, saj vam bo to omogočilo izvedbo kakovostnega in prijetnega
      tekmovanja!
    #original_hash: e6f7d36
    disclaimer_html: >-
      <strong>Opomba</strong>: WCA ne organizira tekmovanj. Kot organizator
      tekmovanja, ki ga odobri WCA, v imenu WCA <strong>ne smete</strong>
      podpisovati ničesar. Obrnite se na ustrezno regionalno ali nacionalno
      kockarsko zvezo, ki organizira tekmovanja ali pomaga pri njihovi
      organizaciji.
