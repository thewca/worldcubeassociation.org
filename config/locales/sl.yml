  organizer_guidelines:
    #original_hash: 7486ac4
    title: Smernice za organizatorje WCA tekmovanj
    paragraph0:
      #original_hash: ee36904
      title: Kratka različica
      #original_hash: 60d9532
      content: >-
        Spodaj najdete kratek povzetek ključnih točk za lažjo predstavo o
        organizaciji tekmovanja. Če menite, da je to primerno za vas, si oglejte
        zgornje dokumente!
    paragraph1:
      #original_hash: e5f5329
      title: Kako organizirati tekmovanje
      #original_hash: 3dbbbee
      content: >-
        Na vseh WCA tekmovanjih mora biti prisoten WCA delegat, ki nadzoruje
        dogajanje. Če želite organizirati svoje tekmovanje, kontaktirajte
        najbližjega WCA delegata. Ta vam bo lahko posredoval več informacij o
        lokalnih praksah in vam pomagali najti primeren datum, saj vedo, ali so
        v istem časovnem okviru načrtovana še kakšna tekmovanja. Če v vaši
        bližini ni delegata WCA, se obrnite na višjega delegata za vašo regijo.
    paragraph2:
      #original_hash: f20dd3b
      title: Pričakovani stroški organizacije tekmovanja
      #original_hash: f16a06f
      content: >-
        Predvideni stroški se od države do države zelo razlikujejo in so odvisni
        od več dejavnikov, kot so velikost prizorišča in drugi splošni pogoji.
        Vse stroške je mogoče pokriti s prijavninami. Vendar pa je za čim nižje
        stroške zelo priporočljivo poiskati sponzorje. Čeprav so WCA delegati
        prostovoljci in za svoje delo ne prejemajo plače, bi morali
        organizatorji razmisliti o plačilu nadomestila za njihove potne stroške.
    paragraph3:
      #original_hash: 00d3bf8
      title: Roki za objavo tekmovanj
      #original_hash: 477a672
      content_html: >-
        Tekmovanje mora biti najavljeno vsaj 28 dni pred začetkom tekmovanja
        (glej <a
        href='https://documents.worldcubeassociation.org/documents/policies/external/Competition%20Requirements.pdf'>pogoje
        za tekmovanje</a>). Vendar pa je to le redko dovolj časa. Upoštevati
        morate vse, kar bo potrebno za organizacijo vašega tekmovanja, in si
        vzeti dovolj časa za pripravo. Prav tako bo WCAT potreboval čas, da
        pregleda vaše tekmovanje, preden bo najavljeno. Če niste prepričani,
        koliko časa bo potrebno, se posvetujte s svojim delegatom.
    paragraph4:
      #original_hash: b6dca56
      title: Pravila oddaljenosti
      #original_hash: 0574d31
      content1: >-
        WCA tekmovanje bo sprejeto, če je oddaljena vsaj 30 km ali 5 dni od
        katerega koli drugega tekmovanja. WCAT podrobneje pregleda predlagano
        tekmovanje, če obstaja drugo tekmovanje, ki je oddaljeno manj kot 30 km
        in 5 dni. Delegat, ki zahteva odobritev takega tekmovanja, mora
        predložiti dodatne informacije o tem, zakaj bi moralo biti tekmovanje
        vseeno sprejeto. Možni argumenti, ki podpirajo sprejetje takega
        tekmovanja, vključujejo:
      olist1:
        #original_hash: de00462
        '1': Tekmovanji si ne delita nobene discipline.
        #original_hash: b8ff462
        '2': Tekmovanji se nahajata v različnih državah.
      #original_hash: 5c5cf04
      content2: >-
        "Sočasna tekmovanja v 3x3x3 optimalno" so WCA tekmovanja, na katerih je
        edina disciplina 3x3x3 optimalno in potekajo na več lokacijah hkrati.
      olist2:
        '1':
          #original_hash: 316fd13
          content1: >-
            Sočasna tekmovanja v 3x3x3 optimalno ne morejo biti del katerega
            koli drugega tekmovanja.
          alist1:
            #original_hash: 75aa0c7
            1a: Časovna okvirja obeh tekmovanj se ne smeta prekrivati.
        '2':
          #original_hash: b2b8004
          content1: >-
            Če je katera koli lokacija takšnih tekmovanj bližje kot 10 km od
            katerega koli drugega običajnega tekmovanja, potem
          alist1:
            #original_hash: 8f532bb
            2a: morata biti tekmovanji vsaj 5 dni narazen ali
            #original_hash: e14e11e
            2b: na drugem tekmovanju ne sme biti discipline 3x3x3 optimalno.
    paragraph-events:
      #original_hash: b16c5f1
      title: Najava disciplin
      #original_hash: 7ad62c7
      content: >-
        Vse discipline, ki bodo potekale na tekmovanju, mora delegat navesti ob
        zahtevi za odobritev tekmovanja. Nadaljnje spremembe mora odobriti WCAT.
    paragraph5:
      #original_hash: 17d01de
      title: Omejitev števila tekmovalcev
      #original_hash: 6bfef2c
      content_html: >-
        Število tekmovalcev je lahko omejeno za disciplino ali za tekmovanje
        (glej <a
        href='https://documents.worldcubeassociation.org/documents/policies/external/Competition%20Requirements.pdf'>pogoje
        za tekmovanje</a>). Delegat tekmovanja mora za omejitev števila
        tekmovalcev pridobiti odobritev WCAT. Omejitev števila tekmovalcev mora
        biti izbrana preudarno in v skladu s pričakovanim interesom tekmovalcev.
        Omejitev naj ne bo manjša, razen če za to obstaja utemeljen razlog.
        Načrtovano omejitev je treba upoštevati že pri iskanju primernega
        prizorišča. Omejitev tekmovalcev mora biti jasno navedena na spletni
        strani WCA na strani tekmovanja.
    paragraph6:
      #original_hash: ce4c3d0
      title: Upravljanje prijav
      #original_hash: bd669a1
      content: >-
        Prijave morajo biti obdelane po vrstnem redu prijave, kar pomeni, da je
        treba najprej obravnavati najzgodnejšo popolno prijavo. Če se prijavnino
        plačuje vnaprej, se prijava šteje za zaključeno, ko je prijavnina
        plačana. To mora biti jasno navedeno v navodilih za plačilo na spletni
        strani tekmovanja.
    paragraph7:
      #original_hash: e4f1c62
      title: Upravljanje čakalnega seznama
      #original_hash: 81ca3f3
      content1: >-
        Ko je omejitev števila tekmovalcev dosežena, se odpre čakalni seznam. Ko
        prijavljeni in potrjeni tekmovalci prijavo prekličejo, jih lahko
        nadomestijo naslednji tekmovalci na čakalnem seznamu.
      #original_hash: 802b34f
      content2: >-
        Če se prijavnina za tekmovanje plača vnaprej, je učinkovit pristop, da
        se prosto mesto ponudi naslednjemu tekmovalcu na čakalni listi in določi
        rok, do katerega mora ta plačati prijavnino (npr. 48 ur). Če plačilo ni
        prejeto pravočasno ali tekmovalec to zavrne, prosto mesto ponudimo
        naslednji osebi na čakalni listi. Ta postopek nadaljujemo, dokler se
        prosta mesta ne zapolnijo. Tekmovalci čakalnega seznama ne morejo
        zaobiti pod nobenim pogojem.
      #original_hash: 37bcbd6
      content3: >-
        Če tekmovalci niso opravili rednega postopka prijave, a so vseeno
        tekmovali, bodo njihovi rezultati odstranjeni za nazaj (ob predpostavki,
        da je obstajala omejitev tekmovalcev in je bila dosežena).
    paragraph8:
      #original_hash: c8ad8e6
      title: Naloge pred tekmovanjem
      list:
        #original_hash: c8abb5e
        '1': >-
          Pred objavo tekmovanja je treba na spletni strani tekmovanja objaviti
          urnik. Ta urnik se lahko kasneje prilagodi.
        #original_hash: e93d043
        '2': >-
          Tekmovalce je treba razdeliti v skupine, tekmovalne listke je treba
          natisniti in razdeliti glede na porazdelitev v skupine. Priporočljivo
          je načrtovati tudi mešačce v posamezni skupini vsake discipline, vsaj
          v prvih krogih. Mešalci morajo biti zanesljivi.
    paragraph9:
      #original_hash: ead44f5
      title: Naloge med tekmovanjem
      #original_hash: ee2e9c6
      content: >-
        O nalogah, ki jih mora organizator opravljati med tekmovanjem, se je
        treba pogovoriti z WCA delegatom. Tipične naloge so (lahko se prenesejo
        na druge zanesljive osebe):
      list:
        #original_hash: 03aea46
        '1': Upravljanje prijav
        #original_hash: c4388f3
        '2': Obveščanje
        #original_hash: 45c78ae
        '3': Klicanje skupin in pripravljanje tekmovalnih listkov
        #original_hash: 0b31986
        '4': Vnašanje in tiskanje rezultatov
        #original_hash: 7ab2d4c
        '5': Iskanje mešalcev in sodnikov
        #original_hash: 52e8316
        '6': >-
          Reševanje vseh organizacijskih vprašanj v zvezi s prizoriščem (npr.
          ključi in WiFi)
