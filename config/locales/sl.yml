    about_us:
      #original_hash: 3ffb811
      title: O nas
      #original_hash: ed77e4c
      text: >-
        Svetovna kockarska zveza (World Cube Association) upravlja tekmovanja v
        reševanju mehanskih ugank, ki se jih rešuje z obračanjem skupin delčkov.
    competitions:
      #original_hash: db98a68
      title: Tekmovanja
      #original_hash: 0ac88bc
      text_html: >-
        Poiščite tekmovanja v vaši bližini ali si oglejte rezultate tekmovanj.
        Ste na tekmovanju in želite videti rezultate? Oglejte si
        %{wca_live_link}!
    merchandise:
      #original_hash: 698cfc8
      title: Izdelki
      #original_hash: 6403f2b
      ad_new: Novo
      #original_hash: 9ad68ce
      text_html: >-
        Oglejte si našo novo predstavljeno uradno ponudbo oblačil, od majic s
        kratkimi rokavi do puloverjev.
      #original_hash: b0fc6c4
      link_title: Povezava do trgovine
    records:
      #original_hash: e51c552
      title: Rekordi
      #original_hash: 3681af0
      text: Oglejte si trenutne in pretekle rekorde v vseh WCA disciplinah.
    volunteer:
      #original_hash: cbf217d
      title: Prostovoljstvo
      #original_hash: 949f739
      text: >-
        Pridružite se! WCA ima v različnih ekipah odprta mesta za prostovoljce.
        Prostovoljci so lahko tudi nekockarji.
    faq:
      #original_hash: 03688ba
      title: Pogosta vprašanja
      #original_hash: 1e0206f
      text: >-
        Če potrebujete kakršnokoli pomoč, si oglejte seznam pogosto zastavljenih
        vprašanj. Tam najdete odgovore na marsikatero vprašanje.
    contact:
      #original_hash: b37456c
      title: Kontakt
      #original_hash: 5c254b6
      text_html: >-
        Če nas želite kontaktirati, lahko to storite preko kontaktnega obrazca.
        Če se vaše vprašanje nanaša na različne postopke v povezavi z WCA, si
        oglejte %{faq_link}!
      #original_hash: d790b40
      faq: pogosto zastavljena vprašanja
      #original_hash: 392f358
      button: Pojdi na kontaktni obrazec WCA
    support:
      #original_hash: 610edba
      title: Podprite WCA
      #original_hash: c254335
      text: >-
        Svetovna kockarska zveza je po členu 501(c)(3) davkov oproščena
        organizacija. Kot neprofitna organizacija, ki jo vodijo izključno
        prostovoljci, z veseljem sprejemamo vaše donacije, ki nam pomagajo
        uresničevati naš cilj – krepiti svetovno skupnost hitrostnega kockanja
        ter ohranjati zabavno in pošteno tekmovalno okolje za vse."
      #original_hash: 65c84ec
      button: 'Več o tem, kako lahko podprete WCA'
