  score_tools:
    #original_hash: 4fc2133
    title: Programska orodja za tekmovanja WCA
    #original_hash: 6d2fe37
    wca_icon_text: Razvija in vzdržuje WST
    intro:
      #original_hash: 0c5fab5
      desc: >-
        Ta stran je neizčrpen seznam orodij, za katera vemo, da se uporabljajo
        pri organizaciji tekmovanj WCA.
      #original_hash: 479b542
      disclaimer: >-
        WST ne vzdržuje vseh orodij na tej strani: to je vsekakor v redu! Za
        upravljanje vse programske opreme, povezane z WCA, nimamo dovolj delovne
        sile :)
      #original_hash: 80f97b9
      used: >-
        Vsi programi na tem seznamu so že bili uporabljeni na pravih tekmovanjih
        WCA in se integrirajo s spletno stranjo WCA: omogočajo vam prijavo z
        vašim računom WCA, da lahko uvozite (in včasih posodobite) podatke o
        prihajajočih tekmovanjih. Za vsakega od njih so jasno navedeni
        vzdrževalci.
    before:
      #original_hash: 9850344
      title: Pred tekmovanjem
      #original_hash: 6f64073
      desc: >-
        Upravljanje prijav je možno neposredno na spletni strani WCA. Ker je
        ročno upravljanje skupin in prostovoljcev lahko zamudno, lahko uporabite
        eno izmed spodnjih orodij.
    during:
      #original_hash: 9934200
      title: Med tekmovanjem
      #original_hash: 2b0a6f6
      desc: >-
        Tukaj boste našli orodja, ki vam omogočajo upravljanje rezultatov med
        samim tekmovanjem.
    after:
      #original_hash: d81b949
      title: Po tekmovanju
      #original_hash: b898460
      desc: >-
        Čeprav se potrjevanje rezultatov izvaja kar na spletni strani, boste
        morali uporabiti neko orodje, s katerim boste mešalne algoritme povezali
        z dejanskimi rezultati.
    tools:
      age:
        #original_hash: 4aaae5b
        title: AGE
        #original_hash: 2e4832d
        description: >-
          Orodje za ustvarjanje in urejanje skupin in dodeljevanje nalog za
          tekmovanja WCA
      certificates:
        #original_hash: b3e4eb0
        title: Certificates
        #original_hash: f1a0731
        description: Natisnite priznanja z uporabo WCA Live
      groupifier:
        #original_hash: 8f55355
        title: Groupifier
        #original_hash: 24d4736
        description: >-
          Orodje za upravljanje nalog in skupin za organizatorje tekmovanj WCA.
          Med glavnimi funkcijami boste našli: razvrščanje tekmovalcev po
          uvrstitvah, dodeljevanje nalog (sojenje, mešanje), odločanje števila
          potrebnih mešalnih algoritmov, ustvarjanje listkov z rezultati,
          listkov za tekmovalce in povzetkov... Za več informacij obiščite
          spletno stran.
      scorecards:
        #original_hash: aa1b64d
        title: Scorecards
        #original_hash: 2b8e373
        description: Natisni tekmovalne listke z uporabo WCA Live
      tnoodle:
        #original_hash: ba336a1
        title: TNoodle (mešalni algoritmi)
        #original_hash: 0a38b22
        description: >-
          TNoodle je uradni program za generiranje mešalnih algoritmov, ki se
          uporabljajo na tekmovanjih WCA. Običajno ga uporabljajo WCA delegati
          pred tekmovanji, vendar njegov uporabniški vmesnik omogoča vsakomur,
          da ustvari poljubno vrsto mešalnih algoritmov za WCA discipline.
      live:
        #original_hash: c66444f
        title: WCA Live
        #original_hash: f122015
        description: Platforma za vodenje tekmovanj WCA in deljenje rezultatov v živo.
      nightmare:
        #original_hash: eebde3b
        title: Preglednice z rezultati
        #original_hash: 466f4c2
        description: >-
          Včasih se stvari zalomijo... Če nimate dostopa do interneta, boste
          morali uporabiti stare dobre preglednice.
      matcher:
        #original_hash: cc59bc9
        title: Scrambles Matcher
        #original_hash: a352bd1
        description: >-
          Se lahko uporabi za povezovanje mešalnih algoritmov, ki jih ustvari
          TNoodle, z rezultati. Uvoz rezultatov s spletne strani WCA (ob uporabi
          WCA Live), preglednice ali samostojne datoteke WCIF. Uvoz mešalnih
          algoritmov iz ene ali več json datotek TNoodle. Izvoz rezultatov v
          ustrezno obliko za oddajo na WCA.
      groups:
        #original_hash: 311a3f6
        title: Competition groups
        #original_hash: 74a0926
        description: Ogled tekmovalnih skupin za katero koli tekmovanje
  logo:
    #original_hash: c72c969
    title: Logotip WCA
    #original_hash: 6520873
    intro: >-
      Logotip WCA je oblikoval Justin Eastman na oblikovalskem natečaju januarja
      2005. Logotip nam je bil všeč zaradi svoje zasnove, barv in dejstva, da ne
      prikazuje posebej kocke 3x3x3.
    headings:
      usage_guidelines:
        #original_hash: d5b47da
        title: Smernice za uporabo
        paragraph:
          #original_hash: 4f84c70
          acceptable_usage: >-
            Sprejemljiva uporaba logotipa WCA je orisana v <a
            href="https://documents.worldcubeassociation.org/documents/policies/external/Logo%20Usage.pdf">Pravilniku
            za uporabo logotipa WCA</a>. Preden logotip WCA uporabite v svojih
            projektih, preberite ta dokument. Vsa dodatna vprašanja glede
            uporabe logotipa WCA posredujte <a
            href="mailto:marketing@worldcubeassociation.org">WCA ekipi za
            trženje</a>.
          #original_hash: ff13c4a
          see_below: >-
            Spodaj so dodatna slogovna navodila za pravilno uporabo logotipa
            WCA.
        color:
          #original_hash: 1d0c830
          title: Barva
          #original_hash: 1959555
          paragraph: >-
            Logotip WCA obstaja v štirih barvnih različicah. Uporabiti je
            potrebno ustrezno barvno različico glede na barvo ozadja medija, na
            katerem se logotip nahaja.
          primary:
            #original_hash: a9a96ec
            title: Primarni
            #original_hash: f31882f
            paragraph: 'Kadar je mogoče, uporabite primarno različico logotipa.'
          mono:
            #original_hash: c5c5533
            title: Enobarvni
            #original_hash: 612044c
            paragraph: >-
              Enobarvno različico uporabite le, ko uporaba primarne verzije ni
              ustrezna.
        logo_only:
          #original_hash: 9271574
          title: Samo logotip
          #original_hash: 4dfab95
          paragraph: >-
            Uporaba logotipa WCA brez napisa je mogoča ob upoštevanju zgornjih
            smernic o barvah.
      download_logo_assets:
        #original_hash: ebc85b2
        title: Prenesi datoteke z logotipom
        #original_hash: 9aa098d
        paragraph: >-
          Za prenos so na voljo PNG formati visoke ločljivosti in vektorske
          različice logotipa WCA.
        #original_hash: 9de7d59
        accept_terms_and_conditions: >-
          Prebral/a sem in sprejemam <a
          href="https://documents.worldcubeassociation.org/documents/policies/external/Logo%20Usage.pdf">Pravilnik
          za uporabo logotipa WCA</a>.
        #original_hash: ebc85b2
        download_button_text: Prenesi datoteke z logotipom
