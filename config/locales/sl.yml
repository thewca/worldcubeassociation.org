  merch:
    #original_hash: 96a95a1
    title: Promocijski izdelki WCA
    paragraphs:
      #original_hash: 8a23af2
      '1': >-
        WCA ponuja ekskluzivno blago, ki ga lahko kupite! Od majic, puloverjev s
        kapuco, nalepk, podlog, nahrbtnikov in še več! Naše dizajne nenehno
        posodabljamo, vključno s klasičnim logotipom WCA, uradnimi izdelki
        svetovnega prvenstva in dizajni svetovnih rekordov.
      #original_hash: 2865e1d
      '2': >-
        Nakup izdelkov WCA v naših trgovinah je eden najboljših načinov, da
        podprete WCA - neprofitno organizacijo, ki jo vodijo prostovoljci. Ves
        dobiček od prodaje izdelkov uporabljamo za nadaljnje financiranje
        prvenstev, opreme in drugih dejavnosti, povezanih z WCA.
      #original_hash: 8e57552
      '3': >-
        Naše izdelke lahko kupite po vsem svetu – v neposrednih trgovinah v
        Evropi, Ameriki in Indiji, kmalu pa bodo na voljo še druge!
