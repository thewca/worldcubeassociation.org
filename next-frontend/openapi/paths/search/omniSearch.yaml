get:
  summary: Omni-search across competitions, persons, regulations and incidents
  tags:
    - search
  operationId: omniSearch
  parameters:
    - name: q
      in: query
      required: true
      schema:
        type: string
  responses:
    '200':
      description: Successful response
      content:
        application/json:
          schema:
            type: object
            required:
              - result
            properties:
              result:
                type: array
                items:
                  $ref: '../../schemas/search/SearchResult.yaml'
