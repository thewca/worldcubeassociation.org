summary: Add a scoretaker to a competition
tags:
  - scoretakers
operationId: addScoretaker
parameters:
  - name: competitionId
    in: path
    required: true
    schema:
      type: string
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - user_id
        properties:
          user_id:
            type: number
responses:
  '200':
    description: The scoretaker that was added
    content:
      application/json:
        schema:
          $ref: '../../../schemas/competitions/Scoretaker.yaml'
