summary: Remove a scoretaker from a competition
tags:
  - scoretakers
operationId: removeScoretaker
parameters:
  - name: competitionId
    in: path
    required: true
    schema:
      type: string
  - name: id
    in: path
    required: true
    description: The user id of the scoretaker to remove
    schema:
      type: number
responses:
  '200':
    description: The competition's scoretakers after removal
    content:
      application/json:
        schema:
          $ref: '../../../schemas/competitions/ScoretakerList.yaml'
