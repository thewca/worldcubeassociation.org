summary: Quits multiple competitors from the round
tags:
  - live
operationId: bulkQuitCompetitors
parameters:
  - name: competitionId
    in: path
    required: true
    schema:
      type: string
  - name: roundId
    in: path
    required: true
    schema:
      type: string
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - registration_ids
        properties:
          registration_ids:
            type: array
            items:
              type: number
          advancing_ids:
            type: array
            items:
              type: number
responses:
  '200':
    description: Returns number of competitors that were marked as quit
    content:
      application/json:
        schema:
          type: object
          required:
            - quit
          properties:
            quit:
              type: number