get:
  summary: Gets a translated version of the WCA Regulations as a rendered HTML fragment
  tags:
    - regulations
  operationId: translatedRegulations
  parameters:
    - name: language
      in: path
      required: true
      schema:
        type: string
  responses:
    '200':
      description: Successful response
      content:
        application/json:
          schema:
            $ref: '../../schemas/regulations/RegulationsContent.yaml'
